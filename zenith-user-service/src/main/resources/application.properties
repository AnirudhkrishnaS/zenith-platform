spring.application.name=zenith-user-service
server.port=8081

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/zenith_users}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-at-least-32-chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
