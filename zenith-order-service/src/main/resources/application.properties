spring.application.name=zenith-order-service
server.port=8083

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/zenith_orders}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Run schema.sql on startup (creates order_number_seq)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Store service (for product/store validation)
store-service.url=${STORE_SERVICE_URL:http://localhost:8082}

# Inventory service (reserve/commit/release)
inventory-service.url=${INVENTORY_SERVICE_URL:http://localhost:8084}

# AWS EventBridge (only used when spring.profiles.active=aws)
events.eventbridge.bus-name=${EVENTBRIDGE_BUS:zenith-events}
events.eventbridge.source=zenith.order-service
events.eventbridge.region=${AWS_REGION:ap-south-1}
